<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadaa Bingo</title>
    <style>
        body { background-color: #0b141a; color: #ffffff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 10px; }
        .dashboard { display: flex; justify-content: space-around; background-color: #111d25; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .stat-box { font-size: 14px; }
        .stat-title { color: #8696a0; font-weight: bold; }
        .stat-value { color: #00a884; font-size: 18px; font-weight: bold; margin-top: 5px; }
        .timer { color: #ff9800; font-size: 20px; margin: 15px 0; font-weight: bold; }
        .announcement { background-color: #20303c; padding: 15px; border-radius: 8px; margin: 10px 0; font-size: 26px; color: #00e676; font-weight: bold; min-height: 40px; }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; max-width: 100%; margin: 0 auto; max-height: 380px; overflow-y: auto; padding: 5px; background-color: #111d25; border-radius: 8px; }
        .card { background-color: #20303c; border: 1px solid #2a3942; border-radius: 6px; padding: 12px 0; font-size: 16px; font-weight: bold; color: #e9edef; cursor: pointer; }
        .card.selected { background-color: #00a884; color: #000000; }
        .card.matched { background-color: #ff9800 !important; color: #ffffff !important; }
        .game-board { display: none; flex-direction: column; align-items: center; }
        .bingo-letters { display: flex; justify-content: space-between; width: 100%; max-width: 360px; margin-bottom: 10px; font-size: 20px; font-weight: bold; color: #00e676; }
        .btn-join { background-color: #00a884; color: #111d25; border: none; border-radius: 8px; padding: 15px 0; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="stat-box"><div class="stat-title">MEDEB</div><div class="stat-value">10 Br</div></div>
        <div class="stat-box"><div class="stat-title">PLAYERS</div><div class="stat-value" id="playerCount">0</div></div>
        <div class="stat-box"><div class="stat-title">BALANCE</div><div class="stat-value" id="userBalance">0 Br</div></div>
        <div class="stat-box"><div class="stat-title">DERASH</div><div class="stat-value" id="derashValue">0 Br</div></div>
    </div>

    <div id="selectionScreen">
        <div class="timer" id="gameTimer">Select Cartala (Up to 5)</div>
        <div class="grid-container" id="cardGrid"></div>
        <button class="btn-join" id="joinBtn" onclick="confirmSelection()">JOIN GAME</button>
    </div>

    <div id="gameScreen" class="game-board">
        <div class="timer" id="liveStatus">🔴 TAPHA KEESSA JIRTAN</div>
        <div class="announcement" id="callBox">Jalqabuuf...</div>
        <div class="bingo-letters">
            <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
        </div>
        <div class="grid-container" id="liveGrid"></div>
    </div>

    <script>
        const amharicVoiceNums = ["","አንድ","ሁለት","ሦስት","አራት","አምስት","ስድስት","ሰባት","ስምንት","ዘጠኝ","አሥር","አሥራ አንድ","አሥራ ሁለት","አሥራ ሦስት","አሥራ አራት","አሥራ አምስት","አሥራ ስድስት","አሥራ ሰባት","አሥራ ስምንት","አሥራ ዘጠኝ","ሃያ","ሃያ አንድ","ሃያ ሁለት","ሃያ ሦስት","ሃያ አራት","ሃያ አምስት","ሃያ ስድስት","ሃያ ሰባት","ሃያ ስምንት","ሃያ ዘጠኝ","ሰላሳ","ሰላሳ አንድ","ሰላሳ ሁለት","ሰላሳ ሦስት","ሰላሳ አራት","ሰላሳ አምስት","ሰላሳ ስድስት","ሰላሳ ሰባት","ሰላሳ ስምንት","ሰላሳ ዘጠኝ","አርባ","አርባ አንድ","አርባ ሁለት","አርባ ሦስት","አርባ አራት","አርባ አምስት","አርባ ስድስት","አርባ ሰባት","አርባ ስምንት","አርባ ዘጠኝ","ሀምሳ","ሀምሳ አንድ","ሀምሳ ሁለት","ሀምሳ ሦስት","ሀምሳ አራት","ሀምሳ አምስት","ሀምሳ ስድስት","ሀምሳ ሰባት","ሀምሳ ስምንት","ሀምሳ ዘጠኝ","ስድሳ","ስድሳ አንድ","ስድሳ ሁለት","ስድሳ ሦስት","ስድሳ አራት","ስድሳ አምስት","ስድሳ ስድስት","ስድሳ ሰባት","ስድሳ ስምንት","ስድሳ ዘጠኝ","ሰባ","ሰባ አንድ","ሰባ ሁለት","ሰባ ሦስት","ሰባ አራት","ሰባ አምስት"];

        const grid = document.getElementById('cardGrid');
        let selectedCards = new Set();
        let countdown = 30;
        let timerInterval, gameInterval;
        let countdownStarted = false;
        let totalWallet = 0;

        // Generate 200 cards
        for (let i = 1; i <= 200; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i;
            card.id = "sel_" + i;
            card.onclick = function() {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedCards.delete(i);
                } else {
                    if (selectedCards.size >= 5) return alert("Kaardii 5 qofa filachuu dandeessa!");
                    this.classList.add('selected');
                    selectedCards.add(i);
                    if (!countdownStarted) startTimer();
                }
                updateDashboard();
            };
            grid.appendChild(card);
        }

        function updateDashboard() {
            let count = selectedCards.size;
            document.getElementById('playerCount').innerText = count;
            document.getElementById('derashValue').innerText = (count * 8) + " Br";
        }

        function startTimer() {
            countdownStarted = true;
            timerInterval = setInterval(() => {
                countdown--;
                document.getElementById('gameTimer').innerText = "Game starting in ⏱ " + countdown + "s";
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    goToGameScreen();
                }
            }, 1000);
        }

        function confirmSelection() {
            if(selectedCards.size === 0) return alert("Maaloo dursa kaardii filadhaa!");
            document.getElementById('joinBtn').innerText = "WAITED FOR START...";
            document.getElementById('joinBtn').disabled = true;
        }

        // TTS Amharic Function
        function speakAmharic(letter, number) {
            let textToSpeak = letter + " " + amharicVoiceNums[number];
            let utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'am-ET'; 
            window.speechSynthesis.speak(utterance);
        }

        function getBingoLetter(num) {
            if (num <= 15) return "B";
            if (num <= 30) return "I";
            if (num <= 45) return "N";
            if (num <= 60) return "G";
            return "O";
        }

        function goToGameScreen() {
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            
            // Generate live screen grid (only show chosen cards for visibility)
            const liveGrid = document.getElementById('liveGrid');
            selectedCards.forEach(num => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = num;
                card.id = "live_" + num;
                liveGrid.appendChild(card);
            });

            startCallingNumbers();
        }

        function startCallingNumbers() {
            let pool = Array.from({length: 75}, (_, i) => i + 1);
            let matchCount = 0;
            let currentDerash = selectedCards.size * 8;

            gameInterval = setInterval(() => {
                if (pool.length === 0) {
                    clearInterval(gameInterval);
                    return;
                }
                let randIndex = Math.floor(Math.random() * pool.length);
                let num = pool.splice(randIndex, 1)[0];
                let letter = getBingoLetter(num);

                document.getElementById('callBox').innerText = letter + "-" + num;
                speakAmharic(letter, num);

                if (selectedCards.has(num)) {
                    document.getElementById("live_" + num).classList.add('matched');
                    matchCount++;
                }

                // If User Wins Bingo
                if (matchCount === selectedCards.size && selectedCards.size > 0) {
                    clearInterval(gameInterval);
                    document.getElementById('callBox').innerText = "🎉 BINGO! Ati Moatteetta!";
                    totalWallet += currentDerash;
                    document.getElementById('userBalance').innerText = totalWallet + " Br";
                } 
                // Bot simulation winning chance
                else if (Math.random() < 0.04 && pool.length < 55) {
                    clearInterval(gameInterval);
                    document.getElementById('callBox').innerText = "😔 Player #" + Math.floor(Math.random() * 50 + 1) + " BINGO Jedhe!";
                }
            }, 3500); 
        }
    </script>
</body>
</html>
