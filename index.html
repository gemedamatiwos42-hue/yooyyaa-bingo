<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadaa Bingo</title>
    <style>
        body {
            background-color: #0b141a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        /* Dashboard jalqaba irratti ni dhokata */
        .dashboard {
            display: none;
            justify-content: space-around;
            background-color: #111d25;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .stat-box {
            font-size: 14px;
        }
        .stat-title {
            color: #8696a0;
            font-weight: bold;
        }
        .stat-value {
            color: #00a884;
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
        }
        .timer {
            color: #00a884;
            font-size: 20px;
            margin: 20px 0;
        }
        /* Kaardii gara 200tti guddiseera */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-width: 100%;
            margin: 0 auto 20px auto;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
            background-color: #111d25;
            border-radius: 8px;
        }
        .card {
            background-color: #20303c;
            border: 1px solid #2a3942;
            border-radius: 6px;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            color: #e9edef;
            cursor: pointer;
        }
        .card.selected {
            background-color: #00a884;
            color: #000000;
        }
        .btn-join {
            background-color: #00a884;
            color: #111d25;
            border: none;
            border-radius: 8px;
            padding: 15px 0;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Dashboard tapha keessa seennaan qofa kan mul'atu -->
    <div class="dashboard" id="gameDashboard">
        <div class="stat-box">
            <div class="stat-title">MEDEB</div>
            <div class="stat-value">10 Br</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">PLAYERS</div>
            <div class="stat-value" id="playerCount">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">BALANCE</div>
            <div class="stat-value" id="userBalance">0 Br</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">DERASH</div>
            <div class="stat-value" id="derashValue">0 Br</div>
        </div>
    </div>

    <div class="timer" id="gameTimer">Game starting in 15s</div>

    <!-- Kaardii 1 hanga 200 -->
    <div class="grid-container" id="cardGrid"></div>

    <button class="btn-join" id="joinBtn" onclick="joinGame()">JOIN GAME</button>

    <script>
        // Kaardii 200 uumuu
        const grid = document.getElementById('cardGrid');
        for (let i = 1; i <= 200; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i;
            card.onclick = function() {
                this.classList.toggle('selected');
            };
            grid.appendChild(card);
        }

        let players = 31; 
        let isJoined = false;

        function joinGame() {
            if (!isJoined) {
                isJoined = true;
                
                // Dashboard saaqi
                document.getElementById('gameDashboard').style.display = 'flex';
                
                // Balance fi Derash herregi
                document.getElementById('userBalance').innerText = "0 Br";
                document.getElementById('derashValue').innerText = (players * 10) + " Br";
                document.getElementById('playerCount').innerText = players;
                
                document.getElementById('joinBtn').innerText = "YOU ARE IN GAME";
                document.getElementById('joinBtn').style.backgroundColor = "#20303c";
                document.getElementById('joinBtn').style.color = "#8696a0";

                // Taphattoota dabalanii fi hir'isaa deemuun asirratti jalqaba
                setInterval(() => {
                    let change = Math.floor(Math.random() * 3) - 1; // -1, 0, ykn +1
                    players += change;
                    if (players < 10) players = 10;
                    
                    document.getElementById('playerCount').innerText = players;
                    document.getElementById('derashValue').innerText = (players * 10) + " Br";
                }, 3000);
            }
        }
    </script>
</body>
</html>
